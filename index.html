<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Countdown Timer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }

    /* 기존 애니메이션 */
    @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes bounce-fast { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    @keyframes shake { 0%, 100% { transform: translateX(0) rotate(0deg); } 20% { transform: translateX(-6px) rotate(-3deg); } 40% { transform: translateX(6px) rotate(3deg); } 60% { transform: translateX(-4px) rotate(-2deg); } 80% { transform: translateX(4px) rotate(2deg); } }
    @keyframes spin-star { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.3); } 100% { transform: rotate(360deg) scale(1); } }
    @keyframes flash-bg { 0%, 100% { opacity: 0; } 50% { opacity: 0.15; } }
    @keyframes celebrateText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes confetti-fall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(60px) rotate(360deg); opacity: 0; } }

    /* 화면 주변 이모티콘 둥둥 떠다니는 애니메이션 추가 */
    @keyframes float1 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
    @keyframes float2 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(-5deg); } }
    @keyframes float3 { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }

    .anim-bounce-slow { animation: bounce-slow 1.5s ease-in-out infinite; }
    .anim-bounce-fast { animation: bounce-fast 0.4s ease-in-out infinite; }
    .anim-shake { animation: shake 0.3s ease-in-out infinite; }
    .anim-spin-star { animation: spin-star 2s linear infinite; }
    .anim-celebrate { animation: celebrateText 0.8s ease-in-out infinite; }
    .flash-overlay { animation: flash-bg 0.5s ease-in-out infinite; }

    .anim-float-1 { animation: float1 4s ease-in-out infinite; }
    .anim-float-2 { animation: float2 5s ease-in-out infinite; }
    .anim-float-3 { animation: float3 3.5s ease-in-out infinite; }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.2s linear;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    .time-btn {
      transition: transform 0.05s active;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .time-btn:active { transform: scale(0.9); }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti-fall 1.5s ease-out forwards; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex flex-col items-center justify-center relative overflow-hidden" style="background: #1a1a2e;">
   
   <div id="flashOverlay" class="absolute inset-0 pointer-events-none" style="background: #ff4757; opacity: 0; z-index: 1;"></div>
   
   <div id="floatingDeco" class="absolute inset-0 pointer-events-none overflow-hidden" style="z-index: 0;">
    <div class="absolute text-5xl anim-float-1" style="top: 10%; left: 8%;">🎈</div>
    <div class="absolute text-5xl anim-float-2" style="top: 15%; right: 10%;">🌈</div>
    <div class="absolute text-5xl anim-float-3" style="bottom: 12%; left: 10%;">🧸</div>
    <div class="absolute text-5xl anim-float-1" style="bottom: 18%; right: 8%;">🎨</div>
    <div class="absolute text-4xl anim-float-2" style="top: 45%; left: 6%;">🎵</div>
    <div class="absolute text-4xl anim-float-3" style="top: 55%; right: 5%;">🚀</div>
    <div class="absolute text-4xl anim-float-1" style="top: 5%; left: 45%;">⭐</div>
   </div>

   <div class="relative flex flex-col items-center gap-4 p-6" style="z-index: 2; max-width: 500px; width: 100%;">
    <h1 id="titleText" class="text-3xl md:text-4xl font-extrabold text-center" style="color: #feca57; text-shadow: 0 2px 10px rgba(254,202,87,0.3);">정리 시간~!</h1>
    
    <div class="relative flex items-center justify-center" style="width: 260px; height: 260px;">
     <svg width="260" height="260" class="absolute">
      <circle cx="130" cy="130" r="115" stroke="#2d2d5e" stroke-width="14" fill="none" />
      <circle id="progressRing" class="progress-ring-circle" cx="130" cy="130" r="115" stroke="#feca57" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="722.57" stroke-dashoffset="722.57" />
     </svg>
     <div id="centerCharacter" class="flex flex-col items-center justify-center">
      <div id="timerEmoji" class="text-6xl anim-bounce-slow">🐥</div>
      <div id="timerDisplay" class="text-5xl font-extrabold mt-1" style="color: #ffffff; height: 1.2em;"></div>
     </div>
    </div>

    <div id="presetRow" class="flex flex-wrap justify-center gap-2 mt-1">
     <button onpointerdown="addTime(30)" class="time-btn px-4 py-2 rounded-full text-lg font-bold" style="background: #6c5ce7; color: #fff;">+30초</button>
     <button onpointerdown="addTime(60)" class="time-btn px-4 py-2 rounded-full text-lg font-bold" style="background: #a29bfe; color: #fff;">+1분</button>
     <button onpointerdown="addTime(120)" class="time-btn px-4 py-2 rounded-full text-lg font-bold" style="background: #74b9ff; color: #fff;">+2분</button>
     <button onpointerdown="addTime(180)" class="time-btn px-4 py-2 rounded-full text-lg font-bold" style="background: #55efc4; color: #1a1a2e;">+3분</button>
     <button onpointerdown="addTime(300)" class="time-btn px-4 py-2 rounded-full text-lg font-bold" style="background: #fd79a8; color: #fff;">+5분</button>
    </div>

    <div id="adjustRow" class="flex items-center justify-center gap-6 mt-1">
     <button onpointerdown="addTime(-10)" class="time-btn w-14 h-14 rounded-full flex items-center justify-center text-3xl font-extrabold shadow-lg" style="background: #e17055; color: #fff;">−</button>
     <span class="text-xl font-bold" style="color: #dfe6e9;">시간 조절</span>
     <button onpointerdown="addTime(10)" class="time-btn w-14 h-14 rounded-full flex items-center justify-center text-3xl font-extrabold shadow-lg" style="background: #00b894; color: #fff;">+</button>
    </div>

    <div class="flex gap-4 mt-3">
     <button id="startBtn" onpointerdown="toggleTimer()" class="time-btn px-8 py-3 rounded-full text-xl font-extrabold shadow-lg" style="background: #00b894; color: #fff; min-width: 140px;"> ▶ 시작 </button>
     <button id="resetBtn" onpointerdown="resetTimer()" class="time-btn px-6 py-3 rounded-full text-xl font-bold shadow-lg" style="background: #636e72; color: #fff;"> ↻ 리셋 </button>
    </div>
    
    <div id="doneMessage" class="text-3xl font-extrabold text-center mt-4 hidden" style="color: #feca57;">정리 끝~! 🎉</div>
   </div>
  </div>

  <script>
  let totalSeconds = 0;
  let remainingSeconds = 0;
  let isRunning = false;
  let intervalId = null;
  let endTime = 0;
  const CIRCUMFERENCE = 722.57;

  function addTime(seconds) {
    if (remainingSeconds + seconds < 0) {
        remainingSeconds = 0;
        totalSeconds = 0;
    } else {
        remainingSeconds += seconds;
        totalSeconds += seconds; 
    }

    if (isRunning) {
        endTime += (seconds * 1000);
    }
    
    updateDisplay();
    updateUrgency();
    document.getElementById('doneMessage').classList.add('hidden');
  }

  function toggleTimer() {
    if (isRunning) pauseTimer();
    else startTimer();
  }

  function startTimer() {
    if (remainingSeconds <= 0) {
        document.getElementById('timerDisplay').classList.add('anim-shake');
        setTimeout(() => document.getElementById('timerDisplay').classList.remove('anim-shake'), 300);
        return;
    }
    
    isRunning = true;
    endTime = Date.now() + (remainingSeconds * 1000);
    document.getElementById('startBtn').innerHTML = '⏸ 멈춤';
    
    intervalId = setInterval(() => {
      const now = Date.now();
      remainingSeconds = Math.max(0, Math.round((endTime - now) / 1000));

      if (remainingSeconds <= 0) {
        clearInterval(intervalId);
        isRunning = false;
        onTimerDone();
      }
      updateDisplay();
      updateUrgency();
    }, 100);
  }

  function pauseTimer() {
    isRunning = false;
    clearInterval(intervalId);
    document.getElementById('startBtn').innerHTML = '▶ 계속';
    setUrgencyLevel(0);
  }

  function resetTimer() {
    isRunning = false;
    clearInterval(intervalId);
    totalSeconds = 0;
    remainingSeconds = 0;
    
    document.getElementById('startBtn').innerHTML = '▶ 시작';
    document.getElementById('doneMessage').classList.add('hidden');
    document.getElementById('timerDisplay').textContent = "";
    document.getElementById('progressRing').style.strokeDashoffset = CIRCUMFERENCE;
    
    setUrgencyLevel(0);
    const emoji = document.getElementById('timerEmoji');
    emoji.innerHTML = '🐥';
    emoji.className = 'text-6xl anim-bounce-slow';
  }

  function updateDisplay() {
    const display = document.getElementById('timerDisplay');
    if (remainingSeconds <= 0 && !isRunning) {
        if (totalSeconds === 0) {
            display.textContent = ""; 
            return;
        }
    }
    const mins = Math.floor(remainingSeconds / 60);
    const secs = remainingSeconds % 60;
    display.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
    const progress = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;
    const offset = CIRCUMFERENCE * (1 - progress);
    document.getElementById('progressRing').style.strokeDashoffset = offset;
  }

  function updateUrgency() {
    if (remainingSeconds === 0) return;
    const pct = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
    
    if (pct <= 0.15) setUrgencyLevel(3);
    else if (pct <= 0.33) setUrgencyLevel(2);
    else setUrgencyLevel(0);
  }

  function setUrgencyLevel(level) {
    const emoji = document.getElementById('timerEmoji');
    const flash = document.getElementById('flashOverlay');
    const display = document.getElementById('timerDisplay');
    flash.classList.remove('flash-overlay');
    flash.style.opacity = '0';

    if (level === 0) {
      emoji.innerHTML = '🐥';
      emoji.className = 'text-6xl anim-bounce-slow';
      display.style.color = "#ffffff";
    } else if (level === 2) {
      // 33% 미만 남았을 때: 빠직 기호가 붙은 화난 병아리
      emoji.innerHTML = '🐥<span style="font-size: 0.6em; position:absolute; top:-10px; right:-15px;">💢</span>'; 
      emoji.className = 'text-6xl anim-bounce-fast relative';
      display.style.color = '#e17055';
    } else if (level === 3) {
      // 15% 미만 남았을 때: 불타는 매우 화난 병아리
      emoji.innerHTML = '🔥🐥🔥';
      emoji.className = 'text-6xl anim-shake';
      display.style.color = '#ff4757';
      flash.classList.add('flash-overlay');
    }
  }

  function onTimerDone() {
    document.getElementById('startBtn').innerHTML = '▶ 시작';
    const doneEl = document.getElementById('doneMessage');
    doneEl.classList.remove('hidden');
    doneEl.className = 'text-3xl font-extrabold text-center mt-4 anim-celebrate';
    const emoji = document.getElementById('timerEmoji');
    emoji.innerHTML = '🎉';
    emoji.className = 'text-7xl anim-spin-star';
    spawnConfetti();
  }

  function spawnConfetti() {
    const container = document.getElementById('app');
    const colors = ['#feca57', '#ff6b6b', '#48dbfb', '#ff9ff3', '#55efc4'];
    for (let i = 0; i < 40; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = Math.random() * 50 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 2000);
    }
  }
  document.getElementById('timerDisplay').textContent = "";
</script>
</body>
</html>
